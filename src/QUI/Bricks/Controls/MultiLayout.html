<div class="{$this->getAttribute('class')}"
     data-layout="{$layout}"
     data-area-count="{$areaCount}"
>
    <div class="quiqqer-bricks-controls-multiLayout-grid">
        {foreach from=$areas item=area}
            <section class="quiqqer-bricks-controls-multiLayout-area quiqqer-bricks-controls-multiLayout-area--{$area.mode} quiqqer-bricks-controls-multiLayout-area--align-{$area.verticalAlign}{if $area.backgroundEnabled && $area.backgroundImage} is-background-enabled{/if}{if $area.backgroundColorEnabled} is-background-color-enabled{/if}"
                    {if $area.areaStyle}style="{$area.areaStyle}"{/if}>
                <div class="quiqqer-bricks-controls-multiLayout-areaContent">
                    {$area.contentHtml}
                </div>
            </section>
        {/foreach}
    </div>
</div>
